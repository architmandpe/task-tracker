<!DOCTYPE html>
<html>
<head>
  <title>Task Tracker</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    input { display: block; margin: 8px 0; padding: 6px; width: 100%; box-sizing: border-box; }
    button { padding: 6px 14px; cursor: pointer; }
    .task { padding: 8px 0; border-bottom: 1px solid #ccc; }
    #error { color: #c0392b; min-height: 1.2em; }
  </style>
</head>
<body>
  <h2>Task Tracker</h2>

  <div id="login-section">
    <input id="email" placeholder="email" autocomplete="username" />
    <input id="password" type="password" placeholder="password" autocomplete="current-password" />
    <button onclick="login()">Log in</button>
    <div id="error"></div>
  </div>

  <div id="tasks-section" style="display:none;">
    <h3>My Tasks</h3>
    <div id="tasks"></div>
  </div>

  <script>
    // Cookie-based auth: the browser attaches the httpOnly cookie to every
    // same-origin request automatically. No token handling in this file at all.

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const resp = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ email, password })
      });
      if (!resp.ok) {
        document.getElementById("error").textContent = "Login failed";
        return;
      }
      document.getElementById("login-section").style.display = "none";
      document.getElementById("tasks-section").style.display = "block";
      loadTasks();
    }

    async function loadTasks() {
      const resp = await fetch("/tasks", { credentials: "same-origin" });
      if (resp.status === 401) {
        document.getElementById("tasks-section").style.display = "none";
        document.getElementById("login-section").style.display = "block";
        document.getElementById("error").textContent = "Session expired, log in again";
        return;
      }
      const tasks = await resp.json();
      const container = document.getElementById("tasks");
      container.innerHTML = tasks.length ? "" : "<em>No tasks yet.</em>";
      tasks.forEach(t => {
        const div = document.createElement("div");
        div.className = "task";
        div.textContent = `${t.title} [${t.status}]`;
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
